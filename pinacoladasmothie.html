<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>PinaColadaSmothie</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page">
    <h1 class="recipe-title"><strong> PIÑA COLADA SMOOTHIE</strong> </h1>
    <img class="recipe-image" src="pinacoladasmothie.jpg" alt="pinacoladasmothie" height="350" width="350">

    <h3 class="section-title">INGREDIENTS</h3>
<p class="recipe-meta ">SERVES 1, MAKES 500 ML</p>
<ul class="ingredients-list">
<li>1 cup pineapple chunks</li>
<li>1 cup coconut milk</li>
<li>½ medium banana</li>
<li>¼ cup ice cubes</li>
<li>2 dates, seedless</li>
<li>⅛ teaspoon vanilla bean powder (optional)</li>
    </ul>

    <p class="section-title">METHOD</p>

    <p class="recipe-step">Place everything into a blender and blend until smooth.
Serve.</p>

</body>
